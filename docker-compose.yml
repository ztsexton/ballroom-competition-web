version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: ballroom-scorer-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ballroom}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ballroom}
      POSTGRES_DB: ${POSTGRES_DB:-ballroom_scorer}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/src/services/data/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ballroom} -d ${POSTGRES_DB:-ballroom_scorer}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
