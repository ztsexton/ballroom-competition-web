{% extends "base.html" %}

{% block title %}Create New Heat - Ballroom Scorer{% endblock %}

{% block content %}
<div class="card">
    <h2>Create New Heat</h2>
    
    <form method="POST">
        <div class="form-group">
            <label for="heat_name">Heat Name</label>
            <input type="text" id="heat_name" name="heat_name" placeholder="e.g., Waltz Final" required>
        </div>
        
        <div class="form-group">
            <label>Select Couples (Bib Numbers)</label>
            
            {% if couples %}
                <div class="checkbox-group">
                    {% for couple in couples %}
                    <div class="checkbox-item">
                        <input type="checkbox" id="bib_{{ couple.bib }}" name="bibs" value="{{ couple.bib }}">
                        <label for="bib_{{ couple.bib }}" style="margin: 0; cursor: pointer;">
                            <strong>#{{ couple.bib }}</strong> - 🤵 {{ couple.leader_name }} & 👗 {{ couple.follower_name }}
                        </label>
                    </div>
                    {% endfor %}
                </div>
            {% else %}
                <div class="alert alert-info">
                    No couples available. Please create couples first.
                    <br><br>
                    <a href="{{ url_for('manage_couples') }}" class="btn btn-secondary">Create Couples</a>
                </div>
            {% endif %}
        </div>
        
        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn" {% if not couples %}disabled{% endif %}>Create Heat</button>
            <a href="{{ url_for('index') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
