{% extends "base.html" %}

{% block title %}Add Judge - Ballroom Scorer{% endblock %}

{% block content %}
<div class="card">
    <h2>➕ Add New Judge</h2>
    <p>Enter the judge's name. A unique judge number will be automatically assigned.</p>
</div>

<div class="card">
    <form method="POST">
        <div class="form-group">
            <label for="name">Judge Name:</label>
            <input type="text" id="name" name="name" required 
                   placeholder="Enter judge's full name">
            <small style="color: #6c757d; display: block; margin-top: 5px;">
                A unique judge number will be automatically assigned
            </small>
        </div>
        
        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn">💾 Add Judge</button>
            <a href="{{ url_for('manage_judges') }}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
