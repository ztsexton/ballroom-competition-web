name: Update Deployment Manifest

on:
  workflow_run:
    workflows: ["Build and Push Docker Image"]
    types:
      - completed
    branches:
      - master
      - main

jobs:
  update-manifest:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event != 'pull_request' }}

    steps:
      - name: Compute image tag
        id: tag
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          SHA="${{ github.event.workflow_run.head_sha }}"
          SHORT_SHA="${SHA:0:7}"
          IMAGE_TAG="${BRANCH}-${SHORT_SHA}"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "Image tag: ${IMAGE_TAG}"

      - name: Checkout personal-infra
        uses: actions/checkout@v4
        with:
          repository: ztsexton/personal-infra
          token: ${{ secrets.INFRA_REPO_PAT }}
          ref: master

      - name: Update deployment.yaml image tag
        run: |
          DEPLOY_FILE="k8s/apps/ballroom-competition-web/deployment.yaml"
          NEW_TAG="${{ steps.tag.outputs.image_tag }}"
          NEW_IMAGE="zot.zachsexton.com/ballroom-competition-web:${NEW_TAG}"

          echo "Updating image to: ${NEW_IMAGE}"

          # Replace the image line (matches any existing tag after the colon)
          sed -i "s|image: zot.zachsexton.com/ballroom-competition-web:.*|image: ${NEW_IMAGE}|" "$DEPLOY_FILE"

          echo "Updated file:"
          grep "image:" "$DEPLOY_FILE"

      - name: Commit and push
        run: |
          cd .
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/apps/ballroom-competition-web/deployment.yaml
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "chore: update ballroom-competition-web to ${{ steps.tag.outputs.image_tag }}"
          git push
